<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <main class="calculator-shell">
        <section class="calculator" aria-label="Calculator">
            <div class="calculator__header">
                <p class="eyebrow">Pocket math</p>
                <h1>Calculator</h1>
                <p class="subtitle">Fast, keyboard-friendly, and clean.</p>
            </div>

            <div class="display" aria-live="polite">
                <div class="display__expression" id="expression"></div>
                <div class="display__result" id="result">0</div>
            </div>

            <div class="keys" role="group" aria-label="Calculator keys">
                <button class="key key--ghost" data-action="clear">AC</button>
                <button class="key key--ghost" data-action="delete">DEL</button>
                <button class="key key--ghost" data-value="(">(</button>
                <button class="key key--operator" data-value=")">)</button>

                <button class="key" data-value="7">7</button>
                <button class="key" data-value="8">8</button>
                <button class="key" data-value="9">9</button>
                <button class="key key--operator" data-value="/">÷</button>

                <button class="key" data-value="4">4</button>
                <button class="key" data-value="5">5</button>
                <button class="key" data-value="6">6</button>
                <button class="key key--operator" data-value="*">×</button>

                <button class="key" data-value="1">1</button>
                <button class="key" data-value="2">2</button>
                <button class="key" data-value="3">3</button>
                <button class="key key--operator" data-value="-">−</button>

                <button class="key key--wide" data-value="0">0</button>
                <button class="key" data-value=".">.</button>
                <button class="key key--operator" data-value="+">+</button>

                <button class="key key--equal" data-action="equals">=</button>
            </div>
        </section>
    </main>

    <script src="calculator.js"></script>
</body>
</html>
