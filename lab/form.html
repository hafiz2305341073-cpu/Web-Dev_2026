<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<body>

<h2 align="center">Student Information Form</h2>

<form>

<fieldset>
<legend>Personal Information</legend>

<label>First name:</label>
<input type="text" name="fname" placeholder="Enter your First Name" required>

<label>Last name:</label>
<input type="text" name="lname" placeholder="Enter your Last Name" required>

<br><br>

<label>Age:</label>
<input type="number" name="age" placeholder="Enter your Age" required>

<label>Birth Date:</label>
<input type="date" name="bdate" required>

<br><br>

<label>Favorite Color:</label>
<input type="color" name="color" required>

<br><br>

<label>Email:</label>
<input type="email" name="email" placeholder="abc@gmail.com" required>

<label>Password:</label>
<input type="password" name="pass" placeholder="******" required>

<br><br>

<label>Address:</label><br>
<textarea name="address" rows="4" cols="50" placeholder="Enter your Address" required></textarea>

</fieldset>

<br>

<fieldset>
<legend>Education</legend>

<label>Select Department:</label>
<select name="dept" required>
<option value="">--Select--</option>
<option value="swe">SWE</option>
<option value="cse">CSE</option>
<option value="eee">EEE</option>
</select>

<br><br>

<label>Select Section:</label>
<input list="sectionList" name="section" placeholder="Write/Choose your section" required>
<datalist id="sectionList">
<option value="A">
<option value="B">
<option value="C">
<option value="D">
</datalist>

<br><br>

<label>Programming Language Skills: low</label>
<input type="range" name="progskill" min="0" max="10" required>
<label>high</label>

<br><br>

<label>Web Technology Skills: low</label>
<input type="range" name="webskill" min="0" max="10" required>
<label>high</label>

<br><br>

<label>Select a file:</label>
<input type="file" name="file" required>

</fieldset>

<br>

<input type="submit" value="Submit">

</form>

</body>

</html>
